name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dev dependencies
        run: npm ci
        env:
          AI_KNOT_SKIP_PYTHON_INSTALL: "1"

      - name: Type check
        run: npm run typecheck

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Version mismatch: tag=$TAG package.json=$PKG"
            exit 1
          fi

      - name: Build (ESM + CJS)
        run: npm run build

      - name: Skip if this version is already published
        id: published
        run: |
          PKG=$(node -p "require('./package.json').version")
          if npm view "ai-knot@${PKG}" version >/dev/null 2>&1; then
            echo "ai-knot@${PKG} already on npm — nothing to publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.published.outputs.skip == 'false'
        run: npm publish --access public
        env:
          # A 404 on PUT here almost always means NODE_AUTH_TOKEN is missing,
          # expired, or lacks publish rights for ai-knot — rotate the NPM_TOKEN
          # secret (see docs/RELEASE.md, "npm token rotation").
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
