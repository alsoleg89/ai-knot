name: Deploy Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/whitepaper.md"
      - "docs/developer-article.md"
      - "docs/site/**"
      - "scripts/render_site_articles.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install site renderer dependency
        run: pip install "markdown-it-py>=3.0"

      - name: Render long-form Pages articles
        run: python scripts/render_site_articles.py

      - name: Copy shared assets into the site root
        run: cp -r docs/assets docs/site/assets

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
