name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write  # needed to push gh-pages benchmark history
  pull-requests: write  # needed to post regression comments on PRs

jobs:
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run benchmarks
        run: |
          pytest tests/test_performance.py -m slow \
            --benchmark-json=benchmark.json \
            --benchmark-min-rounds=5 \
            -v --no-cov

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}-${{ github.sha }}
          path: benchmark.json
          retention-days: 90

      # Create gh-pages branch if it does not exist yet (first run only).
      # github-action-benchmark fetches gh-pages before appending history;
      # the fetch fails with exit 128 when the branch is missing.
      - name: Initialize gh-pages branch if missing
        run: |
          if ! git ls-remote --exit-code origin gh-pages 2>/dev/null; then
            git switch --orphan gh-pages
            git commit --allow-empty -m "Initialize benchmark history"
            git push origin gh-pages
            git checkout -
          fi

      # Continuous benchmark history + regression alerts
      # Pushes results to gh-pages and posts PR comments when perf degrades >150%
      # Reference: github.com/benchmark-action/github-action-benchmark
      - name: Store benchmark trend (gh-pages)
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: agentmemo Python Benchmarks
          tool: pytest
          output-file-path: benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Push history to gh-pages only on pushes to main (not on PRs)
          auto-push: ${{ github.event_name == 'push' }}
          # Post a PR comment when a benchmark regresses by more than 150%
          comment-on-alert: true
          # Do not fail the workflow — informational only
          fail-on-alert: false
          alert-threshold: "150%"
          benchmark-data-dir-path: dev/bench
