name: Public release audit

on:
  push:
    branches:
      - main
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run public release-state audit
        run: |
          python scripts/check_public_release.py \
            --require-pages \
            --json-out /tmp/ai-knot-public-release-audit.json \
            --summary-out /tmp/ai-knot-public-release-audit.md

      - name: Publish audit summary
        if: always()
        run: cat /tmp/ai-knot-public-release-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-knot-public-release-audit
          path: |
            /tmp/ai-knot-public-release-audit.json
            /tmp/ai-knot-public-release-audit.md
