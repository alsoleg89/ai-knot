name: Publish to PyPI (one-time)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-agentmemo:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatch

      - name: Build
        run: hatch build

      - name: Publish agentmemo
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-agentmem:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatch

      - name: Build
        working-directory: typosquat
        run: hatch build

      - name: Publish agentmem
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: typosquat/dist/
