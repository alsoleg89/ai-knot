name: Pre-Launch Audit

on:
  workflow_dispatch:

jobs:

  # ── Job 1: Secret scanning ─────────────────────────────────────────────────
  secret-scan:
    name: "Secret scanning (gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Dependency CVE scan ─────────────────────────────────────────────
  dep-audit:
    name: "Dependency CVE scan (pip-audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install and audit
        run: |
          pip install -e ".[dev,openai]"
          pip install pip-audit
          pip-audit \
            --ignore-vuln CVE-2026-4539  # pygments transitive via ruff, dev-only, no upstream fix yet

  # ── Job 3: Broken links ────────────────────────────────────────────────────
  link-check:
    name: "Broken links (markdown-link-check)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        run: |
          npx --yes markdown-link-check \
            README.md CONTRIBUTING.md CHANGELOG.md ARCHITECTURE.md DEVELOPMENT.md \
            --config .mlc-config.json \
            --quiet

  # ── Job 4: PyPI package validation ────────────────────────────────────────
  pkg-check:
    name: "PyPI package validation (twine)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build and check
        run: |
          pip install build twine
          python -m build
          twine check dist/*

  # ── Job 5: Code checks (AI vocab, sentence rhythm, commit density, security)
  code-checks:
    name: "Code checks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: AI vocabulary check
        run: |
          python3 - <<'EOF'
          import sys
          indicators = [
              "seamlessly", "robust", "leverage", "cutting-edge",
              "streamline", "empower", "game-changer", "revolutionize",
              "state-of-the-art", "out of the box", "at scale",
          ]
          text = open("README.md").read().lower()
          hits = [w for w in indicators if w in text]
          if hits:
              print("FAIL: AI-indicator words found in README.md:")
              for w in hits:
                  print(f"  - {w}")
              sys.exit(1)
          print("PASS: No AI-indicator words found")
          EOF

      - name: Sentence rhythm analysis
        run: |
          python3 - <<'EOF'
          import re, sys
          text = open("README.md").read()
          text = re.sub(r"```.*?```", "", text, flags=re.DOTALL)
          text = re.sub(r"\|.*?\|", "", text)
          sentences = re.split(r"[.!?]+", text)
          lengths = [len(s.split()) for s in sentences if len(s.split()) > 3]
          if len(lengths) < 10:
              print("SKIP: Not enough prose sentences to analyze")
              sys.exit(0)
          avg = sum(lengths) / len(lengths)
          variance = sum((l - avg) ** 2 for l in lengths) / len(lengths)
          print(f"Sentences: {len(lengths)}, avg {avg:.1f} words, variance {variance:.1f}")
          if variance < 20:
              print("FAIL: Low variance — AI-like uniform rhythm (target: > 20)")
              sys.exit(1)
          print("PASS: Natural sentence rhythm")
          EOF

      - name: Commit density check
        run: |
          unique_days=$(git log --format="%ad" --date=short | sort -u | wc -l)
          total=$(git log --oneline | wc -l)
          echo "Unique commit days: $unique_days / Total commits: $total"
          if [ "$unique_days" -le 1 ]; then
            echo "FAIL: All $total commits are on the same day."
            echo "Rewrite git history with spread timestamps before going public."
            exit 1
          fi
          echo "PASS: Commits spread across $unique_days days"

      - name: Security pattern scan
        run: |
          python3 - <<'EOF'
          import re, sys
          from pathlib import Path
          patterns = ["eval(", "exec(", "pickle.loads("]
          hits = []
          for f in Path("src").rglob("*.py"):
              for i, line in enumerate(f.read_text().splitlines(), 1):
                  for p in patterns:
                      if p in line:
                          hits.append(f"{f}:{i}: {line.strip()}")
          if hits:
              print("FAIL: Dangerous patterns found:")
              for h in hits:
                  print(f"  {h}")
              sys.exit(1)
          print("PASS: No dangerous patterns found")
          EOF

  # ── Summary ────────────────────────────────────────────────────────────────
  summary:
    name: "Summary"
    runs-on: ubuntu-latest
    needs: [secret-scan, dep-audit, link-check, pkg-check, code-checks]
    if: always()
    steps:
      - name: Print results
        env:
          SECRET_SCAN: ${{ needs.secret-scan.result }}
          DEP_AUDIT: ${{ needs.dep-audit.result }}
          LINK_CHECK: ${{ needs.link-check.result }}
          PKG_CHECK: ${{ needs.pkg-check.result }}
          CODE_CHECKS: ${{ needs.code-checks.result }}
        run: |
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "  Pre-Launch Audit Results"
          echo "  secret-scan : $SECRET_SCAN"
          echo "  dep-audit   : $DEP_AUDIT"
          echo "  link-check  : $LINK_CHECK"
          echo "  pkg-check   : $PKG_CHECK"
          echo "  code-checks : $CODE_CHECKS"
          echo "───────────────────────────────────────────────"
          echo "  Manual checks (cannot automate):"
          echo "  • AI detection — paste README into ZeroGPT"
          echo "  • GIF/asciinema demo"
          echo "  • GitHub profile bio + repo topics"
          echo "  • Commit timestamps (rebase before launch)"
          echo "═══════════════════════════════════════════════"
          if [ "$SECRET_SCAN" != "success" ] || \
             [ "$DEP_AUDIT"   != "success" ] || \
             [ "$LINK_CHECK"  != "success" ] || \
             [ "$PKG_CHECK"   != "success" ] || \
             [ "$CODE_CHECKS" != "success" ]; then
            echo "OVERALL: FAILED — fix issues above before launch"
            exit 1
          fi
          echo "OVERALL: PASSED"
